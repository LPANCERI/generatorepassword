<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generatore Password</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
    color: white;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 380px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

h1 {
    text-align: center;
    font-size: 18px;
    margin-bottom: 10px;
}

button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 10px;
    background: #4f46e5;
    color: white;
    font-weight: bold;
}

button:hover {
    background: #3730a3;
}

/* GENERA */
.generate-btn {
    width: 100%;
    margin-bottom: 12px;
}

/* PASSWORD ROW */
.password-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
}

#password {
    flex: 1;
    background: #0f172a;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    word-break: break-all;
    display: flex;
    align-items: center;
    min-height: 20px;
}

.copy-btn {
    width: 60px;
}

#check {
    margin-left: 5px;
    color: #22c55e;
    font-weight: bold;
    display: none;
}

/* SECURITY */
#security {
    text-align: center;
    margin-bottom: 10px;
    font-weight: bold;
}

/* OPTIONS */
label {
    display: block;
    margin: 6px 0;
    font-size: 14px;
}

input[type="range"] {
    width: 100%;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="card">

    <h1>🔐 Generatore Password</h1>

    <button class="generate-btn" onclick="generaPassword()">Genera Password</button>

    <div class="password-row">
        <div id="password"></div>
        <button class="copy-btn" onclick="copiaPassword()">📋</button>
        <span id="check">✔</span>
    </div>

    <div id="security">Sicurezza: -</div>

    <label>Lunghezza: <span id="lenVal">12</span></label>
    <input type="range" min="6" max="32" value="12" id="length" oninput="updateLength()">

    <label><input type="checkbox" id="upper" checked> Lettere maiuscole</label>
    <label><input type="checkbox" id="lower" checked> Lettere minuscole</label>
    <label><input type="checkbox" id="numbers" checked> Numeri</label>
    <label><input type="checkbox" id="symbols"> Simboli</label>
    <label><input type="checkbox" id="exclude"> Evita caratteri simili</label>

</div>

<script>

let length = 12;

function updateLength() {
    length = document.getElementById("length").value;
    document.getElementById("lenVal").innerText = length;
}

function generaPassword() {

    const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const lower = "abcdefghijklmnopqrstuvwxyz";
    const numbers = "0123456789";
    const symbols = "!@#$%&*()_+-=[]{}<>?";
    const similar = /[O0l1I]/g;

    let chars = "";

    if (document.getElementById("upper").checked) chars += upper;
    if (document.getElementById("lower").checked) chars += lower;
    if (document.getElementById("numbers").checked) chars += numbers;
    if (document.getElementById("symbols").checked) chars += symbols;

    if (chars === "") {
        document.getElementById("password").innerText = "Seleziona opzioni";
        return;
    }

    let password = "";

    for (let i = 0; i < length; i++) {
        let char = chars.charAt(Math.floor(Math.random() * chars.length));

        if (document.getElementById("exclude").checked) {
            while (char.match(similar)) {
                char = chars.charAt(Math.floor(Math.random() * chars.length));
            }
        }

        password += char;
    }

    document.getElementById("password").innerText = password;

    checkStrength(password);
}

function copiaPassword() {
    const text = document.getElementById("password").innerText;
    const check = document.getElementById("check");

    if (!text || text.includes("Seleziona")) return;

    navigator.clipboard.writeText(text);

    check.style.display = "inline";

    setTimeout(() => {
        check.style.display = "none";
    }, 1500);
}

function checkStrength(pass) {
    let strength = 0;

    if (pass.length >= 12) strength++;
    if (/[A-Z]/.test(pass)) strength++;
    if (/[0-9]/.test(pass)) strength++;
    if (/[^A-Za-z0-9]/.test(pass)) strength++;

    let text = "";
    let color = "";

    if (strength <= 1) {
        text = "Debole";
        color = "#ef4444";
    } else if (strength === 2 || strength === 3) {
        text = "Media";
        color = "#f59e0b";
    } else {
        text = "Forte";
        color = "#22c55e";
    }

    document.getElementById("security").innerText = "Sicurezza: " + text;
    document.getElementById("security").style.color = color;
}

</script>

</body>
</html>
